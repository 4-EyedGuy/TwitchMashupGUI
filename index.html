<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Twitch Multi-Stream Mashup (Web)</title>
    <style>
        body { margin: 0; padding: 15px; font-family: Arial, sans-serif; background: #0e0c13; color: #efeff1; display: flex; height: 97vh; gap: 15px; overflow: hidden; }
        .panel { width: 360px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .main-area { flex: 1; display: flex; flex-direction: column; background: #1f1f23; border-radius: 8px; overflow: hidden; border: 1px solid #3f3f46; }
        h3 { margin: 0; color: #fff; font-size: 22px; }
        .streamer-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .streamer-input { flex: 1; padding: 12px; background: #292933; border: 1px solid #4f4f5a; color: white; border-radius: 6px; font-size: 16px; }
        button#mainBtn { padding: 16px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 8px; }
        #startBtn { background: #9146ff; color: white; }
        #stopBtn { background: #e91916; color: white; }
        .status { background: #292933; padding: 14px; border-radius: 6px; font-size: 15px; line-height: 1.4; }
        #playerContainer { flex: 1; position: relative; background: #000; }
        .player-wrapper { position: absolute; inset: 0; transition: opacity 0.4s ease; }
        iframe { width: 100%; height: 100%; border: none; }
        .tabs { display: flex; background: #292933; padding: 8px; gap: 6px; flex-wrap: wrap; }
        .tab { padding: 10px 16px; background: #3a3a44; border: none; color: #efeff1; border-radius: 6px; cursor: pointer; font-size: 15px; }
        .tab.active { background: #9146ff; }
        .repo-link { text-align: center; margin-top: 12px; font-size: 14px; }
        .repo-link a { color: #9146ff; text-decoration: none; }
    </style>
</head>
<body>

<div class="panel">
    <h3>Twitch Multi-Stream Mashup</h3>
    <label style="color:#adadb8; font-size:15px;">Ники участников (только 2):</label>
    <div id="streamersContainer"></div>

    <div style="display:flex; align-items:center; gap:10px; margin:12px 0;">
        <button id="autoSwitchBtn" style="flex:1; padding:12px; font-size:15px; background:#9146ff; color:white; border:none; border-radius:6px;">Автопереключение: ВКЛ</button>
        <input type="number" id="interval" value="7" style="width:80px; padding:12px; background:#292933; border:1px solid #4f4f5a; color:white; border-radius:6px; font-size:16px;">
        <span style="color:#adadb8;">сек</span>
    </div>

    <button id="startBtn" class="mainBtn">Запустить Мэшап</button>
    <button id="stopBtn" class="mainBtn" disabled>Остановить</button>

    <div class="status" id="status">В веб-версии — только 2 стримера и упрощённый функционал.<br>Полная версия с записью — в Electron.</div>
    
    <div class="repo-link">
        <a href="https://github.com/4-EyedGuy/TwitchMashupGUI" target="_blank">GitHub Репозиторий</a>
    </div>
</div>

<div class="main-area">
    <div class="tabs" id="tabs"></div>
    <div id="playerContainer"></div>
</div>

<script>
    const container = document.getElementById('streamersContainer');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');
    const playerContainer = document.getElementById('playerContainer');
    const tabsContainer = document.getElementById('tabs');
    const autoBtn = document.getElementById('autoSwitchBtn');
    const intervalInput = document.getElementById('interval');

    let streamers = [];
    let currentIndex = 0;
    let autoInterval = null;
    let autoEnabled = true;
    let playerWrappers = [];

    function createRow(value = '') {
        const row = document.createElement('div');
        row.className = 'streamer-row';
        row.innerHTML = `<input type="text" class="streamer-input" value="${value}" placeholder="ник стримера">`;
        container.appendChild(row);
    }

    function initRows() {
        container.innerHTML = '';
        createRow();
        createRow();
    }

    function getStreamers() {
        return Array.from(container.querySelectorAll('.streamer-input'))
                    .map(i => i.value.trim().toLowerCase())
                    .filter(Boolean);
    }

    function createPlayers() {
        playerContainer.innerHTML = '';
        playerWrappers = [];
        tabsContainer.innerHTML = '';

        streamers.forEach((name, i) => {
            // Создаём wrapper
            const wrapper = document.createElement('div');
            wrapper.className = 'player-wrapper';
            wrapper.style.opacity = i === 0 ? '1' : '0';
            wrapper.style.zIndex = i === 0 ? '2' : '1';

            wrapper.innerHTML = `
                <iframe src="https://player.twitch.tv/?channel=${name}&parent=4-eyedguy.github.io&autoplay=true&muted=${i !== 0}" allowfullscreen></iframe>
            `;
            playerContainer.appendChild(wrapper);
            playerWrappers.push(wrapper);

            const tab = document.createElement('button');
            tab.className = 'tab';
            tab.textContent = name.toUpperCase();
            tab.onclick = () => switchTo(i);
            tabsContainer.appendChild(tab);
        });
    }

    function switchTo(index) {
        currentIndex = index;

        playerWrappers.forEach((wrapper, i) => {
            const isActive = i === index;
            wrapper.style.opacity = isActive ? '1' : '0';
            wrapper.style.zIndex = isActive ? '2' : '1';
        });

        document.querySelectorAll('.tab').forEach((tab, i) => {
            tab.classList.toggle('active', i === index);
        });
    }

    function startMashup() {
        streamers = getStreamers();
        if (streamers.length !== 2) {
            alert('В веб-версии должно быть ровно 2 стримера!');
            return;
        }

        createPlayers();
        switchTo(0);
        startAutoSwitch();

        startBtn.disabled = true;
        stopBtn.disabled = false;
        status.textContent = '✅ Оба стрима запущены. Переключайте вручную по вкладкам или автоматически.';
    }

    function startAutoSwitch() {
        clearInterval(autoInterval);
        if (!autoEnabled) return;
        const sec = parseInt(intervalInput.value) || 7;
        autoInterval = setInterval(() => {
            const next = (currentIndex + 1) % 2;
            switchTo(next);
        }, sec * 1000);
    }

    startBtn.onclick = startMashup;
    stopBtn.onclick = () => {
        clearInterval(autoInterval);
        playerContainer.innerHTML = '<div style="color:#adadb8; text-align:center; padding:100px;">Мэшап остановлен</div>';
        startBtn.disabled = false;
        stopBtn.disabled = true;
    };

    autoBtn.onclick = () => {
        autoEnabled = !autoEnabled;
        autoBtn.textContent = autoEnabled ? 'Автопереключение: ВКЛ' : 'Автопереключение: ВЫКЛ';
        autoBtn.style.background = autoEnabled ? '#9146ff' : '#3a3a44';
        if (autoEnabled) startAutoSwitch();
        else clearInterval(autoInterval);
    };

    intervalInput.onchange = () => { if (autoEnabled) startAutoSwitch(); };

    initRows();
</script>

<div id="version-info" style="position: fixed; bottom: 12px; left: 18px; font-size: 13px; color: #6b6b78; z-index: 100; pointer-events: none; user-select: none;">
    TwitchMashup
</div>

<script>
async function loadVersion() {
    const versionEl = document.getElementById('version-info');
    try {
        if (typeof require !== 'undefined') {
            const fs = require('fs');
            const path = require('path');
            const pkg = JSON.parse(fs.readFileSync(path.join(__dirname, 'package.json'), 'utf8'));
            versionEl.textContent = `TwitchMashup • v${pkg.version}`;
        } 
        else {
            const response = await fetch('package.json');
            if (response.ok) {
                const pkg = await response.json();
                versionEl.textContent = `TwitchMashup Web • v${pkg.version}`;
            }
        }
    } catch (e) {
        console.log('Не удалось определить версию автоматически', e);
    }
}

loadVersion();
</script>
</script>
</body>
</html>
