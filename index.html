<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Twitch Multi-Stream Mashup (Web)</title>
    <style>
        body { 
            margin: 0; padding: 15px; font-family: Arial, sans-serif; 
            background: #0e0c13; color: #efeff1; 
            display: flex; height: 97vh; gap: 15px; overflow: hidden; 
        }
        .panel { 
            width: 360px; display: flex; flex-direction: column; gap: 12px; 
            overflow-y: auto; 
        }
        .main-area { 
            flex: 1; display: flex; flex-direction: column; 
            background: #1f1f23; border-radius: 8px; overflow: hidden; 
            border: 1px solid #3f3f46; 
        }
        h3 { margin: 0; color: #fff; font-size: 22px; }
        .streamer-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .streamer-input { 
            flex: 1; padding: 12px; background: #292933; border: 1px solid #4f4f5a; 
            color: white; border-radius: 6px; font-size: 16px; 
        }
        button#mainBtn { 
            padding: 16px; font-size: 18px; font-weight: bold; 
            border-radius: 8px; cursor: pointer; margin-top: 8px;
        }
        #startBtn { padding:12px; font-size:15px; border:none; border-radius:6px; background: #9146ff; color: white; }
        #stopBtn { padding:12px; font-size:15px; border:none; border-radius:6px; background: #e91916; color: white; }

        .status { 
            background: #292933; padding: 14px; border-radius: 6px; 
            font-size: 15px; line-height: 1.4; 
        }
        #playerContainer { flex: 1; position: relative; background: #000; }
        .player-wrapper { 
            position: absolute; inset: 0; 
            transition: opacity 0.3s;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .repo-link { text-align: center; margin-top: 12px; font-size: 14px; }
        .repo-link a { color: #9146ff; text-decoration: none; }
        .note { font-size: 13px; color: #adadb8; margin-top: 8px; }
    </style>
</head>
<body>

<div class="panel">
    <h3>Twitch Multi-Stream Mashup</h3>
    
    <label style="color:#adadb8; font-size:15px;">Ники участников (максимум 2):</label>
    <div id="streamersContainer"></div>

    <div style="display:flex; align-items:center; gap:10px; margin:12px 0;">
        <button id="autoSwitchBtn" style="flex:1; padding:12px; font-size:15px; background:#9146ff; color:white; border:none; border-radius:6px;">
            Автопереключение: ВКЛ
        </button>
        <input type="number" id="interval" value="7" style="width:80px; padding:12px; background:#292933; border:1px solid #4f4f5a; color:white; border-radius:6px; font-size:16px;">
        <span style="color:#adadb8; white-space:nowrap;">сек</span>
    </div>

    <button id="startBtn" class="mainBtn">Запустить Мэшап</button>
    <button id="stopBtn" class="mainBtn" disabled>Остановить</button>

    <div class="status" id="status">В веб-версии можно смотреть только 2 стримера.<br>Для неограниченного количества и записи — используйте Electron.</div>
    
    <div class="repo-link">
        <a href="https://github.com/4-EyedGuy/TwitchMashupGUI" target="_blank">Полная версия (Electron) — GitHub</a>
    </div>
    <div class="note">Web-версия — упрощённая демонстрация</div>
</div>

<div class="main-area">
    <div id="playerContainer"></div>
</div>

<script>
    const container = document.getElementById('streamersContainer');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');
    const playerContainer = document.getElementById('playerContainer');
    const autoBtn = document.getElementById('autoSwitchBtn');
    const intervalInput = document.getElementById('interval');

    let streamers = [];
    let currentIndex = 0;
    let autoInterval = null;
    let autoEnabled = true;
    let players = [];

    function createRow(value = '') {
        const row = document.createElement('div');
        row.className = 'streamer-row';
        row.innerHTML = `
            <input type="text" class="streamer-input" value="${value}" placeholder="ник стримера">
        `;
        container.appendChild(row);
    }

    function initRows() {
        container.innerHTML = '';
        createRow();
        createRow();
    }

    function getStreamers() {
        return Array.from(container.querySelectorAll('.streamer-input'))
                    .map(i => i.value.trim().toLowerCase())
                    .filter(Boolean);
    }

    function createPlayers() {
        playerContainer.innerHTML = '';
        players = [];

        streamers.forEach((name, i) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'player-wrapper';
            wrapper.style.opacity = i === 0 ? '1' : '0';
            wrapper.style.zIndex = i === 0 ? '2' : '1';

            wrapper.innerHTML = `
                <iframe 
                    src="https://player.twitch.tv/?channel=${name}&parent=4-eyedguy.github.io&autoplay=true&muted=${i !== 0}&volume=0.8"
                    allowfullscreen>
                </iframe>
            `;
            playerContainer.appendChild(wrapper);
            players.push(wrapper);
        });
    }

    function switchTo(index) {
        currentIndex = index;
        
        players.forEach((wrapper, i) => {
            const isActive = i === index;
            wrapper.style.opacity = isActive ? '1' : '0';
            wrapper.style.zIndex = isActive ? '2' : '1';
            
            try {
                const iframe = wrapper.querySelector('iframe');
                if (iframe && iframe.contentWindow) {
                }
            } catch(e) {}
        });
    }

    function startMashup() {
        streamers = getStreamers();
        if (streamers.length !== 2) {
            alert('В веб-версии можно использовать ровно 2 стримера!');
            return;
        }

        status.textContent = '✅ Оба стрима запущены. Переключение звука и видео происходит бесшовно.';
        startBtn.disabled = true;
        stopBtn.disabled = false;

        createPlayers();
        switchTo(0);
        startAutoSwitch();
    }

    function startAutoSwitch() {
        clearInterval(autoInterval);
        if (!autoEnabled) return;

        const sec = parseInt(intervalInput.value) || 7;
        autoInterval = setInterval(() => {
            let next = (currentIndex + 1) % 2;
            switchTo(next);
        }, sec * 1000);
    }

    startBtn.onclick = startMashup;
    stopBtn.onclick = () => {
        clearInterval(autoInterval);
        playerContainer.innerHTML = '<div style="color:#adadb8; text-align:center; padding:100px 20px; font-size:18px;">Мэшап остановлен</div>';
        startBtn.disabled = false;
        stopBtn.disabled = true;
        status.textContent = 'Мэшап остановлен.';
    };

    autoBtn.onclick = () => {
        autoEnabled = !autoEnabled;
        autoBtn.textContent = autoEnabled ? 'Автопереключение: ВКЛ' : 'Автопереключение: ВЫКЛ';
        autoBtn.style.background = autoEnabled ? '#9146ff' : '#3a3a44';
        if (autoEnabled) startAutoSwitch();
        else clearInterval(autoInterval);
    };

    intervalInput.onchange = () => {
        if (autoEnabled) startAutoSwitch();
    };

    initRows();
</script>
</body>
</html>
