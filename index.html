<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Twitch Multi-Stream Mashup (Web)</title>
    <style>
        body { 
            margin: 0; padding: 15px; font-family: Arial, sans-serif; 
            background: #0e0c13; color: #efeff1; 
            display: flex; height: 97vh; gap: 15px; overflow: hidden; 
        }
        .panel { 
            width: 360px; display: flex; flex-direction: column; gap: 12px; 
            overflow-y: auto; 
        }
        .main-area { 
            flex: 1; display: flex; flex-direction: column; 
            background: #1f1f23; border-radius: 8px; overflow: hidden; 
            border: 1px solid #3f3f46; 
        }
        h3 { margin: 0; color: #fff; font-size: 22px; }
        .streamer-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
        .streamer-input { 
            flex: 1; padding: 12px; background: #292933; border: 1px solid #4f4f5a; 
            color: white; border-radius: 6px; font-size: 16px; 
        }
        .row-btn { 
            width: 40px; height: 40px; border: none; border-radius: 6px; 
            font-size: 22px; cursor: pointer; 
        }
        .add-btn { background: #9146ff; color: white; }
        .remove-btn { background: #3a3a44; color: #ff8282; }
        
        button#mainBtn { 
            padding: 16px; font-size: 18px; font-weight: bold; 
            border-radius: 8px; cursor: pointer; margin-top: 5px;
        }
        #startBtn { background: #9146ff; color: white; }
        #stopBtn { background: #e91916; color: white; }

        .status { 
            background: #292933; padding: 14px; border-radius: 6px; 
            font-size: 15px; line-height: 1.4; 
        }
        #player { flex: 1; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .tabs { 
            display: flex; background: #292933; padding: 8px; 
            gap: 6px; flex-wrap: wrap; 
        }
        .tab { 
            padding: 10px 16px; background: #3a3a44; border: none; 
            color: #efeff1; border-radius: 6px; cursor: pointer; 
            font-size: 15px; font-weight: 500;
        }
        .tab.active { background: #9146ff; }
        .repo-link { text-align: center; margin-top: 12px; font-size: 14px; }
        .repo-link a { color: #9146ff; text-decoration: none; }
    </style>
</head>
<body>

<div class="panel">
    <h3>Twitch Multi-Stream Mashup</h3>
    
    <label style="color:#adadb8; font-size:15px;">Ники участников:</label>
    <div id="streamersContainer"></div>

    <div style="display:flex; align-items:center; gap:10px; margin:10px 0;">
        <button id="autoSwitchBtn" style="flex:1; padding:12px; font-size:15px; background:#9146ff; color:white; border:none; border-radius:6px;">
            Автопереключение: ВКЛ
        </button>
        <input type="number" id="interval" value="8" style="width:80px; padding:12px; background:#292933; border:1px solid #4f4f5a; color:white; border-radius:6px; font-size:16px;">
        <span style="color:#adadb8; white-space:nowrap;">сек</span>
    </div>

    <button id="startBtn" class="mainBtn">Запустить Мэшап</button>
    <button id="stopBtn" class="mainBtn" disabled>Остановить</button>

    <div class="status" id="status">Готов к работе.<br>Введите ники и нажмите «Запустить Мэшап».</div>
    
    <div class="repo-link">
        <a href="https://github.com/4-EyedGuy/TwitchMashupGUI" target="_blank">Оригинальный репозиторий на GitHub</a>
    </div>
</div>

<div class="main-area">
    <div class="tabs" id="tabs"></div>
    <div id="player"></div>
</div>

<script>
    const container = document.getElementById('streamersContainer');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');
    const player = document.getElementById('player');
    const tabs = document.getElementById('tabs');
    const autoBtn = document.getElementById('autoSwitchBtn');
    const intervalInput = document.getElementById('interval');

    let streamers = [];
    let currentIndex = 0;
    let autoInterval = null;
    let autoEnabled = true;

    function createRow(value = '') {
        const row = document.createElement('div');
        row.className = 'streamer-row';
        row.innerHTML = `
            <input type="text" class="streamer-input" value="${value}" placeholder="ник стримера">
            <button class="row-btn remove-btn">−</button>
        `;
        row.querySelector('.remove-btn').onclick = () => {
            if (container.children.length > 2) row.remove();
        };
        container.appendChild(row);
    }

    function initRows() {
        container.innerHTML = '';
        createRow();
        createRow();
    }

    function getStreamers() {
        return Array.from(container.querySelectorAll('.streamer-input'))
                    .map(i => i.value.trim().toLowerCase())
                    .filter(Boolean);
    }

    function startMashup() {
        streamers = getStreamers();
        if (streamers.length < 2) {
            alert('Введите минимум 2 ника стримеров!');
            return;
        }

        status.innerHTML = `✅ Запущено ${streamers.length} стримеров<br>Переключение работает автоматически и вручную.`;
        startBtn.disabled = true;
        stopBtn.disabled = false;

        tabs.innerHTML = '';
        streamers.forEach((name, i) => {
            const tab = document.createElement('button');
            tab.className = 'tab';
            tab.textContent = name.toUpperCase();
            tab.onclick = () => switchTo(i);
            tabs.appendChild(tab);
        });

        switchTo(0);
        startAutoSwitch();
    }

    function switchTo(index) {
        currentIndex = index;
        const name = streamers[index];
        
        player.innerHTML = `
            <iframe 
                src="https://player.twitch.tv/?channel=${name}&parent=4-eyedguy.github.io&autoplay=true&muted=false&volume=0.8"
                allowfullscreen>
            </iframe>
        `;

        document.querySelectorAll('.tab').forEach((tab, i) => {
            tab.classList.toggle('active', i === index);
        });
    }

    function startAutoSwitch() {
        clearInterval(autoInterval);
        if (!autoEnabled || streamers.length < 2) return;

        const sec = parseInt(intervalInput.value) || 8;
        autoInterval = setInterval(() => {
            let next = (currentIndex + 1) % streamers.length;
            switchTo(next);
        }, sec * 1000);
    }

    startBtn.onclick = startMashup;
    stopBtn.onclick = () => {
        clearInterval(autoInterval);
        player.innerHTML = '<div style="color:#adadb8; text-align:center; padding:80px 20px; font-size:18px;">Мэшап остановлен</div>';
        startBtn.disabled = false;
        stopBtn.disabled = true;
        status.textContent = 'Мэшап остановлен.';
    };

    autoBtn.onclick = () => {
        autoEnabled = !autoEnabled;
        autoBtn.textContent = autoEnabled ? 'Автопереключение: ВКЛ' : 'Автопереключение: ВЫКЛ';
        autoBtn.style.background = autoEnabled ? '#9146ff' : '#3a3a44';
        if (autoEnabled) startAutoSwitch();
        else clearInterval(autoInterval);
    };

    intervalInput.onchange = () => {
        if (autoEnabled) startAutoSwitch();
    };

    initRows();
</script>
</body>
</html>
